<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    CustomLog "|/usr/bin/rotatelogs -l /var/www/html/data/${DEYE_LOG_NAME}/apache-access-%H.log 3600" combined
    ErrorLog  "|/usr/bin/rotatelogs -l /var/www/html/data/${DEYE_LOG_NAME}/apache-error-%H.log 3600"
</VirtualHost>
