<VirtualHost *:443>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    Alias /graphs "${GRAPHS_PATH}"

    <Directory "${GRAPHS_PATH}">
        Options +Indexes
        AllowOverride None
        Require all granted
        IndexOptions FancyIndexing FoldersFirst VersionSort NameWidth=* DescriptionWidth=* Charset=UTF-8 ShowForbidden
    </Directory>

    CustomLog "|/usr/local/bin/hourly_log_rotator.py /var/www/html/data/${DEYE_LOG_NAME} apache-access-{0}.log" combined
    ErrorLog  "|/usr/local/bin/hourly_log_rotator.py /var/www/html/data/${DEYE_LOG_NAME} apache-error-{0}.log"

    SSLEngine on

    SSLCertificateFile /etc/ssl/certs/apache-selfsigned.crt
    SSLCertificateKeyFile /etc/ssl/private/apache-selfsigned.key

    <FilesMatch "\.(?:cgi|shtml|phtml|php)$">
        SSLOptions +StdEnvVars
    </FilesMatch>
    <Directory /usr/lib/cgi-bin>
        SSLOptions +StdEnvVars
    </Directory>
</VirtualHost>
