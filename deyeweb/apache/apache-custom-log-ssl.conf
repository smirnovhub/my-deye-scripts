<VirtualHost *:443>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    CustomLog "|/usr/local/bin/hourly_log_rotator.py /var/www/html/data/${DEYE_LOG_NAME} apache-access-{hour}.log" combined
    ErrorLog  "|/usr/local/bin/hourly_log_rotator.py /var/www/html/data/${DEYE_LOG_NAME} apache-error-{hour}.log"

    SSLEngine on

    SSLCertificateFile /etc/ssl/certs/apache-selfsigned.crt
    SSLCertificateKeyFile /etc/ssl/private/apache-selfsigned.key

    <FilesMatch "\.(?:cgi|shtml|phtml|php)$">
        SSLOptions +StdEnvVars
    </FilesMatch>
    <Directory /usr/lib/cgi-bin>
        SSLOptions +StdEnvVars
    </Directory>
</VirtualHost>
