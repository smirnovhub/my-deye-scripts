# WARNING: IF YOU ARE RENAMING THIS FILE, DON'T
# FORGET TO CHANGE NAMES ALSO IN:
# Dockerfile
# entrypoint.sh

# Enable keep alive
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 15

# Preserve the original Host header from the client 
ProxyPreserveHost On

# Set proxy timeout
ProxyTimeout 10

# Set proxy to the root of the server
# for GET requests to accessing frontend
# Using an empty capturing group () in the regex to prevent Apache from
# automatically appending a trailing slash. 
# - ^/()$ matches only the root path "/"
# - The empty group () captures nothing, so $1 expands to an empty string
# - This ensures the proxied target becomes "${BACK_SERVER_URL}/front" exactly,
#   without Apache adding a trailing "/" as it normally does for directory-like paths
ProxyPassMatch ^/()$ ${BACK_SERVER_URL}/front$1 disablereuse=Off keepalive=On max=30 smax=20 ttl=15 retry=0
ProxyPassReverse / ${BACK_SERVER_URL}/front

# Set proxy to the /back.php of the server
# for POST requests to accessing backend
ProxyPass /back.php ${BACK_SERVER_URL}/back disablereuse=Off keepalive=On max=30 smax=20 ttl=15 retry=1
ProxyPassReverse /back.php ${BACK_SERVER_URL}/back

# Access control for the backend destination
<Proxy "${BACK_SERVER_URL}/front">
    Require all granted
</Proxy>

<Proxy "${BACK_SERVER_URL}/back">
    Require all granted
</Proxy>
