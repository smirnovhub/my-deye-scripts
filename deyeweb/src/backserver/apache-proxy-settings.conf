# WARNING: IF YOU ARE RENAMING THIS FILE, DON'T
# FORGET TO CHANGE NAMES ALSO IN:
# Dockerfile
# entrypoint.sh

# Enable keep alive
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 15

# Preserve the original Host header from the client 
ProxyPreserveHost On

# Set proxy timeout
ProxyTimeout 10

# Set proxy to the root of the server
# for GET requests to accessing frontend
ProxyPassMatch ^/$ ${BACK_SERVER_URL} disablereuse=Off keepalive=On max=30 smax=20 ttl=15 retry=0
ProxyPassReverse / ${BACK_SERVER_URL}

# Set proxy to the /back.php of the server
# for POST requests to accessing backend
ProxyPass /back.php ${BACK_SERVER_URL} disablereuse=Off keepalive=On max=30 smax=20 ttl=15 retry=0
ProxyPassReverse /back.php ${BACK_SERVER_URL}

# Access control for the backend destination
<Proxy "${BACK_SERVER_URL}">
    Require all granted
</Proxy>
