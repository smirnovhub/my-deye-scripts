# Preserve the original Host header from the client 
ProxyPreserveHost On

# Set proxy timeout
ProxyTimeout 10

# Proxy /back to backend URL without trailing slashes 
ProxyPass        /back ${BACK_SERVER_URL}
ProxyPassReverse /back ${BACK_SERVER_URL}

# Access control for the backend destination
<Proxy "${BACK_SERVER_URL}">
    Require all granted
</Proxy>
