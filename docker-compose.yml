# See .env file for additional parameters like BRANCH, etc.
services:
  # Temporary service to fix permissions on start
  # This container will run and exit immediately
  init-permissions:
    image: busybox
    container_name: init-permissions
    volumes:
      - deye_shared_volume:/data
    command: chmod 1777 /data

  deye-web:
    build:
      context: .
      dockerfile: deyeweb/Dockerfile
      target: deyeweb
      args:
        BRANCH: ${APP_BRANCH}
        DEYE_GRAPHS_DIR: deye-graphs
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      deye-proxy-master:
        condition: service_started
#      deye-proxy-slave1:
#        condition: service_started
      deye-storage:
        condition: service_started
      deye-back-server:
        condition: service_started
    environment:
      DEYE_MASTER_LOGGER_HOST: deye-proxy-master
      DEYE_MASTER_LOGGER_SERIAL: ${DEYE_MASTER_LOGGER_SERIAL}

#      DEYE_SLAVE1_LOGGER_HOST: deye-proxy-slave1
#      DEYE_SLAVE1_LOGGER_SERIAL: ${DEYE_SLAVE1_LOGGER_SERIAL}

      REMOTE_CACHE_SERVER_URL: http://deye-storage
      DEYE_GRAPHS_FORMAT: ${DEYE_GRAPHS_FORMAT}

      BACK_SERVER_URL: http://deye-back-server

      DEYE_PV_ENERGY_COSTS_JSON: ${DEYE_PV_ENERGY_COSTS_JSON}
      DEYE_GRID_PURCHASED_ENERGY_COSTS_JSON: ${DEYE_GRID_PURCHASED_ENERGY_COSTS_JSON}
      DEYE_GRID_FEED_IN_ENERGY_COSTS_JSON: ${DEYE_GRID_FEED_IN_ENERGY_COSTS_JSON}
      DEYE_GEN_ENERGY_COSTS_JSON: ${DEYE_GEN_ENERGY_COSTS_JSON}

      DEYE_ENERGY_COST_CURRENCY_CODE: ${DEYE_ENERGY_COST_CURRENCY_CODE}

      DEYE_WEB_REGISTER_VALUE_CORRECTIONS_JSON: ""
      DEYE_WEB_SECTION_TITLE_CORRECTIONS_JSON: ""
      DEYE_WEB_REGISTER_DESCRIPTION_REPLACEMENTS_JSON: ""
      DEYE_WEB_GRAPHS_BASE_URL: graphs/

      DEYE_GPS_LATITUDE: ${DEYE_GPS_LATITUDE}
      DEYE_GPS_LONGITUDE: ${DEYE_GPS_LONGITUDE}

      DEYE_LOG_NAME: deye-web
    image: deye-web
    container_name: deye-web
    restart: unless-stopped
    ports:
      - "${DEYE_WEB_HTTP_MAPPING_PORT}:80"
      - "${DEYE_WEB_HTTPS_MAPPING_PORT}:443"
    deploy:
      resources:
        limits:
          pids: ${GLOBAL_PIDS_LIMIT}
          memory: ${GLOBAL_MEMORY_LIMIT}
    volumes:
      # Mount shared folder with read-write permissions
      - deye_shared_volume:/var/www/html/data

  deye-back-server:
    build:
      context: .
      dockerfile: deyeweb/Dockerfile
      target: deyebackserver
      args:
        BRANCH: ${APP_BRANCH}
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      deye-proxy-master:
        condition: service_started
#      deye-proxy-slave1:
#        condition: service_started
      deye-storage:
        condition: service_started
    environment:
      DEYE_MASTER_LOGGER_HOST: deye-proxy-master
      DEYE_MASTER_LOGGER_SERIAL: ${DEYE_MASTER_LOGGER_SERIAL}

#      DEYE_SLAVE1_LOGGER_HOST: deye-proxy-slave1
#      DEYE_SLAVE1_LOGGER_SERIAL: ${DEYE_SLAVE1_LOGGER_SERIAL}

      REMOTE_CACHE_SERVER_URL: http://deye-storage
      DEYE_GRAPHS_FORMAT: ${DEYE_GRAPHS_FORMAT}

      DEYE_PV_ENERGY_COSTS_JSON: ${DEYE_PV_ENERGY_COSTS_JSON}
      DEYE_GRID_PURCHASED_ENERGY_COSTS_JSON: ${DEYE_GRID_PURCHASED_ENERGY_COSTS_JSON}
      DEYE_GRID_FEED_IN_ENERGY_COSTS_JSON: ${DEYE_GRID_FEED_IN_ENERGY_COSTS_JSON}
      DEYE_GEN_ENERGY_COSTS_JSON: ${DEYE_GEN_ENERGY_COSTS_JSON}

      DEYE_ENERGY_COST_CURRENCY_CODE: ${DEYE_ENERGY_COST_CURRENCY_CODE}

      DEYE_WEB_REGISTER_VALUE_CORRECTIONS_JSON: ""
      DEYE_WEB_SECTION_TITLE_CORRECTIONS_JSON: ""
      DEYE_WEB_REGISTER_DESCRIPTION_REPLACEMENTS_JSON: ""
      DEYE_WEB_GRAPHS_BASE_URL: graphs/

      DEYE_GPS_LATITUDE: ${DEYE_GPS_LATITUDE}
      DEYE_GPS_LONGITUDE: ${DEYE_GPS_LONGITUDE}

      DEYE_LOG_NAME: deye-back-server

      SERVER_PORT: 80
      BACK_EXECUTION_TIMEOUT: 15
    image: deye-back-server
    container_name: deye-back-server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          pids: ${GLOBAL_PIDS_LIMIT}
          memory: ${GLOBAL_MEMORY_LIMIT}
    healthcheck:
      test: ["CMD", "/usr/local/bin/pids_guard.sh"]
      interval: 5m
      timeout: 15s
      retries: 1
    volumes:
      # Mount shared folder with read-write permissions
      - deye_shared_volume:/home/backserver/my-deye-scripts/deyeweb/data

  deye-data-collector:
    build:
      context: .
      dockerfile: data_collector/Dockerfile
      args:
        BRANCH: ${APP_BRANCH}
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      deye-proxy-master:
        condition: service_started
#      deye-proxy-slave1:
#        condition: service_started
    environment:
      DEYE_MASTER_LOGGER_HOST: deye-proxy-master
      DEYE_MASTER_LOGGER_SERIAL: ${DEYE_MASTER_LOGGER_SERIAL}

      DEYE_DATA_COLLECTOR_DIR: ${DEYE_DATA_COLLECTOR_DIR}
      DATA_COLLECTING_INTERVAL: ${DEYE_DATA_COLLECTING_INTERVAL}

      DEYE_PV_ENERGY_COSTS_JSON: ${DEYE_PV_ENERGY_COSTS_JSON}
      DEYE_GRID_PURCHASED_ENERGY_COSTS_JSON: ${DEYE_GRID_PURCHASED_ENERGY_COSTS_JSON}
      DEYE_GRID_FEED_IN_ENERGY_COSTS_JSON: ${DEYE_GRID_FEED_IN_ENERGY_COSTS_JSON}
      DEYE_GEN_ENERGY_COSTS_JSON: ${DEYE_GEN_ENERGY_COSTS_JSON}

      DEYE_ENERGY_COST_CURRENCY_CODE: ${DEYE_ENERGY_COST_CURRENCY_CODE}

      TELEGRAM_BOT_API_TOKEN: ${TELEGRAM_BOT_API_TOKEN}
      TELEGRAM_PRIVATE_CHAT_ID: ${TELEGRAM_PRIVATE_CHAT_ID}
      TELEGRAM_PUBLIC_CHAT_ID: ${TELEGRAM_PUBLIC_CHAT_ID}

      DEYE_LOG_NAME: deye-data-collector
    image: deye-data-collector
    container_name: deye-data-collector
    restart: unless-stopped
    deploy:
      resources:
        limits:
          pids: ${GLOBAL_PIDS_LIMIT}
          memory: ${GLOBAL_MEMORY_LIMIT}
    volumes:
      # Mount shared folder with read-write permissions
      - deye_shared_volume:/home/datacollector/my-deye-scripts/data_collector/data

  telebot:
    build:
      context: .
      dockerfile: telebot/Dockerfile
      args:
        BRANCH: ${APP_BRANCH}
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      deye-proxy-master:
        condition: service_started
#      deye-proxy-slave1:
#        condition: service_started
      deye-storage:
        condition: service_started
      deye-graph-server:
        condition: service_started
    environment:
      DEYE_MASTER_LOGGER_HOST: deye-proxy-master
      DEYE_MASTER_LOGGER_SERIAL: ${DEYE_MASTER_LOGGER_SERIAL}

#      DEYE_SLAVE1_LOGGER_HOST: deye-proxy-slave1
#      DEYE_SLAVE1_LOGGER_SERIAL: ${DEYE_SLAVE1_LOGGER_SERIAL}

      REMOTE_CACHE_SERVER_URL: http://deye-storage
      REMOTE_GRAPH_SERVER_URL: http://deye-graph-server
      DEYE_GRAPHS_FORMAT: ${DEYE_GRAPHS_FORMAT}

      DEYE_PV_ENERGY_COSTS_JSON: ${DEYE_PV_ENERGY_COSTS_JSON}
      DEYE_GRID_PURCHASED_ENERGY_COSTS_JSON: ${DEYE_GRID_PURCHASED_ENERGY_COSTS_JSON}
      DEYE_GRID_FEED_IN_ENERGY_COSTS_JSON: ${DEYE_GRID_FEED_IN_ENERGY_COSTS_JSON}
      DEYE_GEN_ENERGY_COSTS_JSON: ${DEYE_GEN_ENERGY_COSTS_JSON}

      DEYE_ENERGY_COST_CURRENCY_CODE: ${DEYE_ENERGY_COST_CURRENCY_CODE}

      TELEGRAM_ADMIN_USER_ID: ${TELEGRAM_ADMIN_USER_ID}
      TELEGRAM_BOT_API_TOKEN: ${TELEGRAM_BOT_API_TOKEN}
      TELEGRAM_BOT_API_TEST_TOKEN: ${TELEGRAM_BOT_API_TEST_TOKEN}
      TELEGRAM_PRIVATE_CHAT_ID: ${TELEGRAM_PRIVATE_CHAT_ID}
      TELEGRAM_PUBLIC_CHAT_ID: ${TELEGRAM_PUBLIC_CHAT_ID}

      DEYE_LOG_NAME: telebot
    image: telebot
    container_name: telebot
    restart: unless-stopped
    deploy:
      resources:
        limits:
          pids: ${DEYE_TELEBOT_PIDS_LIMIT}
          memory: ${DEYE_TELEBOT_MEMORY_LIMIT}
    healthcheck:
      test: ["CMD", "/usr/local/bin/pids_guard.sh"]
      interval: 5m
      timeout: 15s
      retries: 1
    volumes:
      # Mount shared folder with read-write permissions
      - deye_shared_volume:/home/telebot/my-deye-scripts/telebot/data

  deye-graph-server:
    build:
      context: .
      dockerfile: deye_graph_server/Dockerfile
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    environment:
      DEYE_DATA_COLLECTOR_DIR: ${DEYE_DATA_COLLECTOR_DIR}
      DEYE_LOG_NAME: deye-graph-server
      SERVER_PORT: 80
    image: deye-graph-server
    container_name: deye-graph-server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          pids: ${GLOBAL_PIDS_LIMIT}
          memory: ${GRAPH_SERVER_MEMORY_LIMIT}
    volumes:
      # Mount shared folder with read-write permissions
      - deye_shared_volume:/home/deyegraphserver/deye_graph_server/data

  deye-graph-generator:
    build:
      context: .
      dockerfile: deye_graph_generator/Dockerfile
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    environment:
      TELEGRAM_BOT_API_TOKEN: ${TELEGRAM_BOT_API_TOKEN}
      TELEGRAM_PRIVATE_CHAT_ID: ${TELEGRAM_PRIVATE_CHAT_ID}
      TELEGRAM_PUBLIC_CHAT_ID: ${TELEGRAM_PUBLIC_CHAT_ID}

      REMOTE_GRAPH_SERVER_URL: http://deye-graph-server
      DEYE_GRAPHS_DIR: deye-graphs
      DEYE_GRAPHS_FORMAT: ${DEYE_GRAPHS_FORMAT}

      DEYE_LOG_NAME: deye-graph-generator
    image: graph-generator
    container_name: deye-graph-generator
    restart: unless-stopped
    deploy:
      resources:
        limits:
          pids: ${GLOBAL_PIDS_LIMIT}
          memory: ${GLOBAL_MEMORY_LIMIT}
    volumes:
      # Mount shared folder with read-write permissions
      - deye_shared_volume:/home/graphgenerator/deye_graph_generator/data

  deye-storage:
    build:
      context: .
      dockerfile: deyestorage/Dockerfile
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    environment:
      DEYE_LOG_NAME: deye-storage
      SERVER_PORT: 80
      MAX_KEYS_COUNT: 32
      MAX_JSON_SIZE: 32768
      MAX_JSON_STORAGE_SIZE: 262144
    image: deye-storage
    container_name: deye-storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          pids: ${GLOBAL_PIDS_LIMIT}
          memory: ${GLOBAL_MEMORY_LIMIT}
    volumes:
      # Mount shared folder with read-write permissions
      - deye_shared_volume:/home/deyestorage/deyestorage/data

  deye-proxy-master:
    build:
      context: .
      dockerfile: deyeproxy/Dockerfile
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    environment:
      DEYE_LOG_NAME: deye-proxy-master
      LOGGER_HOST: ${DEYE_MASTER_LOGGER_HOST}
      LOGGER_PORT: 8899
      PROXY_PORT: 8899
      MAX_CONCURRENT_CONNECTIONS: 10
      CONNECT_TIMEOUT: 5
      DATA_TIMEOUT: 10
      LOG_LEVEL: INFO
    image: deye-proxy
    container_name: deye-proxy-master
    restart: unless-stopped
    deploy:
      resources:
        limits:
          pids: ${GLOBAL_PIDS_LIMIT}
          memory: ${GLOBAL_MEMORY_LIMIT}
    volumes:
      # Mount shared folder with read-write permissions
      - deye_shared_volume:/home/deyeproxy/deyeproxy/data

#  deye-proxy-slave1:
#    build:
#      context: .
#      dockerfile: deyeproxy/Dockerfile
#    depends_on:
#      init-permissions:
#        condition: service_completed_successfully
#    environment:
#      DEYE_LOG_NAME: deye-proxy-slave1
#      LOGGER_HOST: ${DEYE_SLAVE1_LOGGER_HOST}
#      LOGGER_PORT: 8899
#      PROXY_PORT: 8899
#      MAX_CONCURRENT_CONNECTIONS: 10
#      CONNECT_TIMEOUT: 5
#      DATA_TIMEOUT: 10
#      LOG_LEVEL: INFO
#    image: deye-proxy
#    container_name: deye-proxy-slave1
#    restart: unless-stopped
#    deploy:
#      resources:
#        limits:
#          pids: ${GLOBAL_PIDS_LIMIT}
#          memory: ${GLOBAL_MEMORY_LIMIT}
#    volumes:
#      # Mount shared folder with read-write permissions
#      - deye_shared_volume:/home/deyeproxy/deyeproxy/data

  log-observer:
    build:
      context: .
      dockerfile: logobserver/Dockerfile
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    image: log-observer
    container_name: log-observer
    restart: unless-stopped
    ports:
      - "${LOG_OBSERVER_HTTP_MAPPING_PORT}:80"
      - "${LOG_OBSERVER_HTTPS_MAPPING_PORT}:443"
    deploy:
      resources:
        limits:
          pids: ${GLOBAL_PIDS_LIMIT}
          memory: ${GLOBAL_MEMORY_LIMIT}
    volumes:
      # Mount shared folder with read-write permissions
      - deye_shared_volume:/var/www/html

volumes:
  deye_shared_volume: {}
