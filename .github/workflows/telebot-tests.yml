name: telebot tests

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  telebot-tests:
    name: telebot-tests (${{ matrix.python-version }})
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: "3.8"
            delay: 0
          - python-version: "3.14"
            delay: 10

    steps:
      - uses: actions/checkout@v4

      - name: Staggered start
        run: |
          # Wait to avoid simultaneous API requests or resource spikes
          echo "Waiting ${{ matrix.delay }} seconds for Python ${{ matrix.python-version }}..."
          sleep ${{ matrix.delay }}
          echo "Waiting completed."

      - name: Initialize and update submodules recursively
        run: git submodule update --init --recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests aiohttp fastapi uvicorn mashumaro

      - name: Run tests
        env:
          IS_TEST_RUN: "true"
          DEYE_LOG_NAME: telebot_test
          TELEGRAM_ADMIN_USER_ID: 12345
          TELEGRAM_BOT_API_TEST_TOKEN: ${{ secrets.TELEGRAM_BOT_API_TEST_TOKEN }}
        run: |
          python -u test/src/telebot_test.py
