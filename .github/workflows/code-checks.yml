name: code checks

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  code-checks:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 codespell mypy types-requests

      - name: Run flake8 checks
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude modules

      - name: Run codespell checks
        run: |
          codespell . --skip="./modules/*,JsHttpRequest.php,JsHttpRequest.js,*.svg,*.log"

      - name: Run mypy for deye
        working-directory: deye
        run: |
          mypy --ignore-missing-imports --python-version=${{ matrix.python-version }} src

      - name: Run mypy for telebot
        working-directory: telebot
        run: |
          mypy --ignore-missing-imports --python-version=${{ matrix.python-version }} src

      - name: Run mypy for test
        working-directory: test
        run: |
          mypy --ignore-missing-imports --python-version=${{ matrix.python-version }} src
