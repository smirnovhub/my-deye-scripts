name: code checks

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  code-checks:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 codespell

      - name: Run flake8 checks
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude modules

      - name: Run codespell checks
        run: |
          codespell . --skip="./modules/*,JsHttpRequest.php,JsHttpRequest.js,*.svg,*.log"

  mypy-checks:
    needs: code-checks
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.14"]
        project:
          - { dir: "common", path: "." }
          - { dir: "data_collector", path: "src" }
          - { dir: "deye", path: "src" }
          - { dir: "deye_graph_server", path: "src" }
          - { dir: "deyeproxy", path: "src" }
          - { dir: "deyestorage", path: "src" }
          - { dir: "deyeweb", path: "src" }
          - { dir: "telebot", path: "src" }
          - { dir: "test", path: "src" }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mypy types-requests

      - name: Run mypy for ${{ matrix.project.dir }}
        working-directory: ${{ matrix.project.dir }}
        run: |
          mypy --ignore-missing-imports --check-untyped-defs --python-version=${{ matrix.python-version }} ${{ matrix.project.path }}
