name: code checks

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  code-checks:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 codespell mypy types-requests

      - name: Run flake8 checks
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude modules

      - name: Run codespell checks
        run: |
          codespell . --skip="./modules/*,JsHttpRequest.php,JsHttpRequest.js,*.svg,*.log"

      - name: Run mypy checks
        run: |
          mypy --ignore-missing-imports --check-untyped-defs --python-version=${{ matrix.python-version }} common
          mypy --ignore-missing-imports --check-untyped-defs --python-version=${{ matrix.python-version }} data_collector
          mypy --ignore-missing-imports --check-untyped-defs --python-version=${{ matrix.python-version }} deye
          mypy --ignore-missing-imports --check-untyped-defs --python-version=${{ matrix.python-version }} deye_graph_server
          mypy --ignore-missing-imports --check-untyped-defs --python-version=${{ matrix.python-version }} deyeproxy
          mypy --ignore-missing-imports --check-untyped-defs --python-version=${{ matrix.python-version }} deyestorage
          mypy --ignore-missing-imports --check-untyped-defs --python-version=${{ matrix.python-version }} deyeweb
          mypy --ignore-missing-imports --check-untyped-defs --python-version=${{ matrix.python-version }} telebot/src
          mypy --ignore-missing-imports --check-untyped-defs --python-version=${{ matrix.python-version }} test/src
