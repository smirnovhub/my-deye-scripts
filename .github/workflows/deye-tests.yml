name: write registers test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  write-registers-test:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize and update submodules recursively
        run: git submodule update --init --recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests fastapi uvicorn aiohttp

      - name: Run single inverter tests
        env:
          DEYE_LOG_NAME: single_inverter_tests
        run: |
          python -u test/src/deye_register_types_test.py
          python -u test/src/deye_single_inverter_test.py

      - name: Run multi inverter tests
        env:
          DEYE_LOG_NAME: multi_inverter_tests
        run: |
          python -u test/src/deye_group_read_test.py
          python -u test/src/deye_multi_inverter_test.py

      - name: Run write registers tests
        env:
          DEYE_LOG_NAME: write_registers_tests
        run: |
          python -u test/src/deye_write_registers_test_1.py
          python -u test/src/deye_write_registers_test_2.py
          python -u test/src/deye_write_registers_test_3.py

      - name: Run cache tests
        env:
          DEYE_LOG_NAME: deye_cache_tests
        run: |
          python -u test/src/deye_cache_server_test.py
          python -u test/src/deye_registers_local_cache_manager_test.py
          python -u test/src/deye_registers_local_cache_test.py
          python -u test/src/deye_registers_remote_cache_manager_test.py
          python -u test/src/deye_registers_remote_cache_test.py

